name: Update stats after score

on:
  push:
    branches: [main]
    paths: ['index.html']

jobs:
  update-stats:
    # Ne pas tourner sur les commits automatiques du bot
    if: "!startsWith(github.event.head_commit.message, 'Auto :')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Vérifier si un scoreWinner a été ajouté
        id: check
        run: |
          # Comparer index.html avec le commit précédent
          git diff HEAD~1 HEAD -- index.html | grep -q "^+.*scoreWinner:'[AB]'" \
            && echo "changed=true" >> $GITHUB_OUTPUT \
            || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Recalculer PLAYER_STATS et PAIR_STATS
        if: steps.check.outputs.changed == 'true'
        run: python3 .github/scripts/update_stats.py

      - name: Commit & push si changement
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "five-lundi-bot"
          git config user.email "bot@five-lundi.fr"
          git add index.html
          git diff --cached --quiet && echo "Stats déjà à jour" && exit 0
          git commit -m "Auto : mise à jour PLAYER_STATS + PAIR_STATS"
          git push origin main
