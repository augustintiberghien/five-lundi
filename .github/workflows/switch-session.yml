name: Switch active session

on:
  workflow_dispatch:   # Déclenché par Edge Function Supabase au 10ème vote
  schedule:
    # Mercredi 01h30 Paris CEST (UTC+2) = 23h30 UTC mardi
    # Cas deadline : vote jamais atteint 10 votes → on bascule à 01h30 mercredi (22h30 mardi + 3h)
    - cron: '30 23 * * 2'

jobs:
  switch:
    runs-on: ubuntu-latest
    # 6h max — couvre le pire cas : 10 votes arrivés juste après 22h30, sleep jusqu'à 01h30 (3h)
    timeout-minutes: 200
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Check timing & switch session
        env:
          TRIGGER: ${{ github.event_name }}
        run: python3 .github/scripts/switch_session.py

      - name: Commit & push si changement
        run: |
          git config user.name "five-lundi-bot"
          git config user.email "bot@five-lundi.fr"
          git add index.html CLAUDE.md
          git diff --cached --quiet && echo "Rien à committer" && exit 0
          git commit -m "Auto : passage à la session suivante"
          git push origin main
