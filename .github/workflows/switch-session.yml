name: Switch active session

on:
  workflow_dispatch:   # Déclenché par le webhook Supabase (vote inséré)
  schedule:
    # 01h30 Paris CEST (UTC+2) = 23h30 UTC — mardi matin (vote rapide, 10 votes dans la nuit du match)
    - cron: '30 23 * * 1'
    # 01h30 Paris CEST (UTC+2) = 23h30 UTC — mercredi matin (deadline 22h30 mardi + 3h)
    - cron: '30 23 * * 2'

jobs:
  switch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Check timing & switch session
        run: python3 .github/scripts/switch_session.py

      - name: Commit & push si changement
        run: |
          git config user.name "five-lundi-bot"
          git config user.email "bot@five-lundi.fr"
          git add index.html CLAUDE.md
          git diff --cached --quiet && echo "Rien à committer" && exit 0
          git commit -m "Auto : passage à la session suivante"
          git push origin main
