<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#0d1117">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Five Lundi</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0d1117 !important}
html::before,html::after,body::before,body::after{background:#0d1117}
body{
  background:#0d1117;font-family:'Barlow',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:1.5rem 1rem 3rem;overflow-x:hidden;

}
header{text-align:center;margin-bottom:0;width:100%;padding-top:2.4rem;padding-bottom:0}
.title{font-family:'Oswald',sans-serif;font-size:clamp(2.2rem,5.5vw,3.2rem);font-weight:700;
  color:#FFD600;letter-spacing:.1em;text-transform:uppercase;line-height:1}
.meta-sub{font-size:.62rem;color:rgba(255,255,255,.28);margin-top:.35rem;letter-spacing:.22em;text-transform:uppercase}

/* ONGLETS SESSION */
.tabs{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;margin-bottom:.6rem;max-width:560px}
.tab{font-size:.72rem;font-weight:500;padding:.3rem .75rem;border-radius:99px;cursor:pointer;
  border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.45);transition:all .15s;white-space:nowrap}
.tab:hover{background:rgba(255,255,255,.1);color:#fff}
.tab.active{background:#FFD600;color:#000;border-color:#FFD600;font-weight:700}

/* ONGLETS VUE (terrain / stats) */
.view-tabs{display:flex;gap:.3rem;justify-content:center;margin-bottom:.8rem}
.vtab{font-size:.68rem;font-weight:600;padding:.25rem .8rem;border-radius:99px;cursor:pointer;
  border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);transition:all .15s}
.vtab:hover{background:rgba(255,255,255,.1);color:#fff}
.vtab.active{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.4)}

/* HEADER SESSION */
.session-header{display:flex;gap:1.2rem;justify-content:center;align-items:center;margin-bottom:1.6rem;margin-top:1.4rem}
.team-pill{font-family:'Oswald',sans-serif;font-size:.95rem;font-weight:600;padding:.25rem .9rem;border-radius:4px}
.pill-a{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.25)}
.pill-b{background:rgba(77,159,255,.15);color:#4d9fff;border:1px solid rgba(77,159,255,.4)}
.score-bubble{font-family:'Oswald',sans-serif;font-size:2.2rem;font-weight:700;letter-spacing:.05em}
.score-pending{color:#FFD600}
.score-win-a{color:#ffffff}
.score-win-b{color:#4d9fff}

/* TERRAIN */
.pitch-wrap{position:relative;width:min(calc(100vw - 2rem),480px);aspect-ratio:8/12;overflow:visible}
.pitch{width:100%;height:100%;border-radius:10px;overflow:visible;background:#1b7a2a;position:relative}
.pitch-bg{position:absolute;inset:0;border-radius:10px;overflow:hidden;background:#1b7a2a}
.stripe{position:absolute;left:0;right:0;background:#1e8a30}
.lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.player{position:absolute;transform:translate(-50%,-50%);z-index:10}

/* ═══════════════════════════════════════════
   CARTES JOUEURS — COLLECTOR FIFA × POKÉMON
   ═══════════════════════════════════════════ */
@keyframes holo-hover {
  0%   { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}
/* Carte de base */
.card {
  width: 86px;
  display: flex;
  flex-direction: column;
  border-radius: 10px 10px 6px 6px;
  overflow: visible;
  position: relative;
  cursor: pointer;
  transition: transform .3s cubic-bezier(.22,1,.36,1), box-shadow .3s;
  border: none !important;
  isolation: isolate;
}
/* Fond équipe A — blanc/vert sombre */
.card.team-a {
  background: linear-gradient(160deg, #1c2e0a 0%, #2a4510 30%, #1a300b 60%, #1f3a0d 100%);
  --team-glow: rgba(255,255,255,.55);
  --team-accent: #ffffff;
  --team-accent2: #e0ffe0;
  --corner-color: #ffffff;
}
/* Fond équipe B — bleu nuit */
.card.team-b {
  background: linear-gradient(160deg, #060d1e 0%, #0c1c38 30%, #081428 60%, #0d1e3c 100%);
  --team-glow: rgba(77,159,255,.7);
  --team-accent: #4d9fff;
  --team-accent2: #00cfff;
  --corner-color: #4d9fff;
}

/* ── Texture noise ── */
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
  opacity: .4;
  mix-blend-mode: overlay;
}

/* ── Film holographique prismatique ── */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    repeating-linear-gradient(
      105deg,
      transparent 0px,
      rgba(255,0,180,.06) 2px,
      rgba(0,255,255,.07) 4px,
      rgba(255,255,0,.05) 6px,
      rgba(180,0,255,.06) 8px,
      transparent 10px
    ),
    linear-gradient(135deg,
      transparent 20%,
      rgba(255,200,0,.08) 35%,
      rgba(0,200,255,.1) 50%,
      rgba(200,0,255,.08) 65%,
      transparent 80%
    );
  background-size: 200% 200%, 300% 300%;
  opacity: 0;
  transition: opacity .4s;
  pointer-events: none;
  z-index: 8;
  mix-blend-mode: screen;
  animation: holo-shift 4s linear infinite;
}
.card.js-tilt-active::after { opacity: 1; }
@keyframes holo-shift {
  0%   { background-position: 0% 0%, 0% 0%; }
  50%  { background-position: 100% 100%, 100% 100%; }
  100% { background-position: 0% 0%, 0% 0%; }
}

/* ── Cadre fin nacré style Pokémon ── */
.card-border {
  position: absolute;
  inset: -3px;
  border-radius: 12px 12px 8px 8px;
  pointer-events: none;
  z-index: 12;
  padding: 3px;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  background-size: 200% 200%;
  animation: frame-shimmer 5s linear infinite;
}

.team-a .card-border {
  background: linear-gradient(135deg,
    rgba(255,255,255,.08) 0%,
    #ffffff 20%,
    rgba(255,255,255,.7) 35%,
    rgba(255,255,255,.15) 50%,
    #ffffff 65%,
    rgba(255,255,255,.5) 80%,
    rgba(255,255,255,.08) 100%);
}

.team-b .card-border {
  background: linear-gradient(135deg,
    rgba(77,159,255,.08) 0%,
    #4d9fff 20%,
    rgba(150,210,255,.9) 35%,
    rgba(77,159,255,.15) 50%,
    #4d9fff 65%,
    rgba(120,190,255,.6) 80%,
    rgba(77,159,255,.08) 100%);
}

@keyframes frame-shimmer {
  0%   { background-position: 0% 0%; }
  50%  { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}

.card-corner { display: none; }

/* ── Hover lift — géré en JS pour le tilt 3D ── */
.card.js-tilt-active {
  box-shadow:
    0 20px 50px rgba(0,0,0,.95),
    0 0 0 1.5px var(--team-accent),
    0 0 30px 6px var(--team-glow),
    0 0 60px 10px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.4);
  z-index: 99;
}
.card.js-tilt-active .card-border {
  animation: border-rotate 1.5s linear infinite;
}

/* ── Shine spot Pokémon ── */
.card-shine {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(
    farthest-corner ellipse at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(255,255,255,.5) 0%,
    rgba(255,255,255,.25) 20%,
    transparent 60%
  );
  opacity: 0;
  transition: opacity .4s;
  pointer-events: none;
  z-index: 9;
  mix-blend-mode: overlay;
}
.card.js-tilt-active .card-shine { opacity: 1; }

/* ── Holo prismatique dynamique ── */
.card-holo {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    repeating-linear-gradient(
      0deg,
      hsla(calc(var(--mouse-x, 50) * 3.6deg + var(--mouse-y, 50) * 1.8deg), 100%, 50%, .05) 0px,
      hsla(calc(var(--mouse-x, 50) * 3.6deg + var(--mouse-y, 50) * 1.8deg + 60deg), 100%, 50%, .05) 2px,
      transparent 2px,
      transparent 4px
    ),
    repeating-linear-gradient(
      90deg,
      hsla(calc(var(--mouse-x, 50) * 3.6deg), 100%, 50%, .05) 0px,
      transparent 2px,
      transparent 4px
    );
  background-blend-mode: color-dodge;
  opacity: 0;
  transition: opacity .4s;
  pointer-events: none;
  z-index: 7;
  mix-blend-mode: color-dodge;
}
.card.js-tilt-active .card-holo { opacity: .6; }

/* ── BADGES DE FORME — effets sur la carte ── */

/* 🔥 EN FEU — feu CSS organique style BD */
@keyframes fire-flicker-1 {
  0%,100%{ transform:translate(-50%,-50%) scale(1,1)    rotate(-1deg); opacity:.95; }
  25%    { transform:translate(-50%,-50%) scale(1.04,.97) rotate(1deg);  opacity:.85; }
  50%    { transform:translate(-50%,-50%) scale(.97,1.05) rotate(0deg);  opacity:1;   }
  75%    { transform:translate(-50%,-50%) scale(1.02,.98) rotate(-2deg); opacity:.9;  }
}
@keyframes fire-flicker-2 {
  0%,100%{ transform:translate(-50%,-50%) scale(1,1)    rotate(2deg);  opacity:.8; }
  33%    { transform:translate(-50%,-50%) scale(1.06,.94) rotate(-1deg); opacity:.95;}
  66%    { transform:translate(-50%,-50%) scale(.95,1.08) rotate(1deg);  opacity:.75;}
}
@keyframes fire-flicker-3 {
  0%,100%{ transform:translate(-50%,-50%) scale(1.02,1) rotate(-2deg); opacity:.7; }
  50%    { transform:translate(-50%,-50%) scale(.98,1.04) rotate(2deg);  opacity:.9; }
}

/* Couche de feu — pseudo-élément blob organique */
.fire-layer {
  position: absolute;
  left: 50%; top: 50%;
  border-radius: 38% 62% 55% 45% / 45% 38% 62% 55%;
  pointer-events: none;
  mix-blend-mode: screen;
  z-index: -1; /* derrière tout */
}
.fire-layer-1 {
  width: 110px; height: 145px;
  background: radial-gradient(ellipse at 50% 70%,
    #fff7a0 0%, #ffcc00 25%, #ff6600 55%, #cc1100 80%, transparent 100%);
  filter: blur(4px);
  animation: fire-flicker-1 0.18s ease-in-out infinite;
  opacity: .9;
  z-index: -1;
}
.fire-layer-2 {
  width: 100px; height: 135px;
  border-radius: 55% 45% 38% 62% / 62% 55% 45% 38%;
  background: radial-gradient(ellipse at 45% 65%,
    #ffffff 0%, #ffee00 20%, #ff8800 50%, #dd2200 78%, transparent 100%);
  filter: blur(5px);
  animation: fire-flicker-2 0.22s ease-in-out infinite;
  opacity: .8;
  z-index: -1;
}
.fire-layer-3 {
  width: 92px; height: 125px;
  border-radius: 45% 55% 62% 38% / 38% 62% 45% 55%;
  background: radial-gradient(ellipse at 55% 60%,
    #fffce0 0%, #ffdd00 15%, #ff7700 48%, #bb1100 75%, transparent 100%);
  filter: blur(3px);
  animation: fire-flicker-3 0.14s ease-in-out infinite;
  opacity: .75;
  z-index: -1;
}

/* Contour BD noir par-dessus tout */
.fire-outline {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 96px; height: 125px;
  border-radius: 38% 62% 55% 45% / 45% 38% 62% 55%;
  box-shadow:
    0 0 0 3px #000,
    0 0 0 5px #ff5500,
    0 0 0 7px #000;
  pointer-events: none;
  z-index: 3;
  animation: fire-flicker-1 0.18s ease-in-out infinite;
}

.badge-fire .card {
  box-shadow: 0 0 18px 6px #ff6600, 0 0 40px 12px #ff330055 !important;
}

/* 🛡️ INVINCIBLE — contour or qui tourne */
@keyframes gold-glow {
  0%,100% { box-shadow: 0 0 8px 3px #ffd600, 0 0 22px 6px #ffaa00, 0 0 0 1px #ffd600; border-color: #ffd600; }
  50%      { box-shadow: 0 0 14px 5px #ffe85c, 0 0 32px 10px #ffd600, 0 0 0 1px #ffe85c; border-color: #ffe85c; }
}
@keyframes gold-sweep {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
.badge-invincible .card {
  border-color: #ffd600 !important;
  animation: gold-glow 1.8s ease-in-out infinite;
  overflow: visible !important;
}
.badge-invincible .card::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 11px;
  background: conic-gradient(transparent 60%, #ffd60088 75%, transparent 90%);
  animation: gold-sweep 2.5s linear infinite;
  pointer-events: none;
  z-index: -1;
}
.badge-invincible-label {
  position: absolute;
  top: -18px; left: 50%;
  transform: translateX(-50%);
  font-size: 9px; font-weight: 700;
  color: #ffd600;
  font-family: 'Barlow', sans-serif;
  text-transform: uppercase;
  letter-spacing: .08em;
  white-space: nowrap;
  text-shadow: 0 1px 4px rgba(0,0,0,.9);
  pointer-events: none;
}

/* 💀 MAUDIT — contour violet sombre qui pulse */
@keyframes curse-pulse {
  0%,100% { box-shadow: 0 0 6px 2px #7b00ff, 0 0 16px 4px #3d0080, 0 0 28px 6px #7b00ff44; border-color: #7b00ff; }
  50%      { box-shadow: 0 0 10px 3px #b44fff, 0 0 22px 6px #7b00ff, 0 0 34px 8px #b44fff44; border-color: #b44fff; }
}
@keyframes curse-flicker {
  0%,100% { opacity: 1; } 92% { opacity: 1; } 94% { opacity: .6; } 96% { opacity: 1; } 98% { opacity: .7; }
}
.badge-curse .card {
  border-color: #7b00ff !important;
  animation: curse-pulse 2s ease-in-out infinite, curse-flicker 4s ease-in-out infinite;
  overflow: visible !important;
}
.badge-curse-label {
  position: absolute;
  top: -18px; left: 50%;
  transform: translateX(-50%);
  font-size: 9px; font-weight: 700;
  color: #b44fff;
  font-family: 'Barlow', sans-serif;
  text-transform: uppercase;
  letter-spacing: .08em;
  white-space: nowrap;
  text-shadow: 0 1px 4px rgba(0,0,0,.9);
  pointer-events: none;
}

/* 📈 EN FORME — contour vert vif qui pulse avec glow fort */
@keyframes form-up {
  0%,100% {
    box-shadow: 0 0 8px 3px #4ade80, 0 0 20px 6px #22c55e88, 0 0 40px 10px #4ade8033;
  }
  50% {
    box-shadow: 0 0 14px 5px #86efac, 0 0 30px 10px #4ade8099, 0 0 55px 14px #4ade8055;
  }
}
.badge-up .card {
  animation: form-up 1.8s ease-in-out infinite;
}
.badge-up .card::before {
  background: linear-gradient(135deg,
    #4ade80 0%,
    rgba(255,255,255,.7) 35%,
    rgba(255,255,255,.15) 50%,
    #4ade80 65%,
    rgba(134,239,172,.8) 100%) !important;
  padding: 2px !important;
}
.badge-up-label {
  position: absolute;
  top: -18px; left: 50%;
  transform: translateX(-50%);
  font-size: 9px; font-weight: 700;
  color: #4ade80;
  font-family: 'Barlow', sans-serif;
  text-transform: uppercase;
  letter-spacing: .08em;
  white-space: nowrap;
  text-shadow: 0 1px 4px rgba(0,0,0,.9);
  pointer-events: none;
}

/* 📉 EN GALÈRE — contour rouge sang qui tremble */
@keyframes pain-glow {
  0%,100% { box-shadow: 0 0 6px 2px #b91c1c, 0 0 16px 4px #7f1d1d88; border-color: #b91c1c; }
  50%      { box-shadow: 0 0 10px 4px #ef4444, 0 0 22px 6px #b91c1c66; border-color: #ef4444; }
}
@keyframes pain-shake {
  0%,100% { transform: translateX(0); }
  10%      { transform: translateX(-1.5px); }
  20%      { transform: translateX(1.5px); }
  30%      { transform: translateX(-1px); }
  40%      { transform: translateX(1px); }
  50%      { transform: translateX(0); }
}
/* pain-glow sur .card (box-shadow seulement, pas de transform) */
.badge-down .card {
  border-color: #b91c1c !important;
  animation: pain-glow 1.4s ease-in-out infinite;
  overflow: visible !important;
  background: linear-gradient(180deg, #1a0000 0%, #111 40%) !important;
}
/* pain-shake sur .cphoto pour ne pas conflicter avec le transform JS de .card */
.badge-down .cphoto {
  animation: pain-shake 1.8s ease-in-out infinite;
}
.badge-down:hover .cphoto {
  animation-play-state: paused;
}
.badge-down .card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 6px;
  background: linear-gradient(180deg, #b91c1c18 0%, transparent 60%);
  pointer-events: none;
  z-index: 1;
}

/* Wrapper pour les badges */
.badge-label {
  position: absolute;
  top: -18px; left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 30;
}

/* ── COMPTE À REBOURS ── */
.countdown-wrap {
  text-align: center;
  padding: .6rem 0 1.2rem;
  font-family: 'Oswald', sans-serif;
  border-bottom: 1px solid rgba(255,255,255,.07);
  margin-bottom: 1.2rem;
  width: 100%;
}
.countdown-label {
  font-size: .58rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: rgba(255,255,255,.3);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .4rem;
}
.countdown-label::before,
.countdown-label::after {
  content: '';
  display: inline-block;
  width: 24px;
  height: 1px;
  background: rgba(255,255,255,.15);
}
#countdown-timer {
  display: flex;
  justify-content: center;
  gap: 8px;
  align-items: baseline;
}
.cd-unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px;
  padding: 6px 10px;
  min-width: 44px;
}
.cd-unit b {
  font-size: 26px;
  font-weight: 700;
  color: #FFD600;
  line-height: 1;
  letter-spacing: .02em;
}
.cd-unit small {
  font-size: 8px;
  color: rgba(255,255,255,.3);
  text-transform: uppercase;
  letter-spacing: .14em;
  margin-top: 2px;
}
.cd-now {
  font-size: 18px;
  color: #4caf50;
  font-weight: 700;
  letter-spacing: .05em;
  animation: trophy-bounce 1s ease-in-out infinite;
}

/* ── PHOTO ── */
.cphoto {
  position: relative;
  width: 86px;
  height: 88px;
  overflow: hidden;
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  background: linear-gradient(180deg, #1a3a0d 0%, #0d1f06 100%);
  border-radius: 10px 10px 0 0;
}
.team-b .cphoto { background: linear-gradient(180deg, #0c1c38 0%, #060e1f 100%); }
.cphoto img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
  filter: contrast(1.1) saturate(1.2) brightness(1.02);
}
/* Vignette bas de photo */
.cphoto::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg,
    transparent 40%,
    rgba(0,0,0,.4) 75%,
    rgba(0,0,0,.75) 100%);
  pointer-events: none;
  z-index: 2;
}
/* Reflet en haut de la photo */
.cphoto::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 30%;
  background: linear-gradient(180deg, rgba(255,255,255,.08) 0%, transparent 100%);
  z-index: 3;
  pointer-events: none;
}
/* ── RÔLE ── */
.crole {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 3px 3px 2.5px;
  font-size: 6px;
  font-weight: 800;
  font-family: 'Barlow', sans-serif;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--team-accent);
  text-align: center;
  background: rgba(0,0,0,.82);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  z-index: 4;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
/* ── NOM ── */
.cname {
  font-family: 'Oswald', sans-serif;
  font-size: 10.5px;
  font-weight: 700;
  color: #fff;
  text-transform: uppercase;
  text-align: center;
  padding: 5px 3px 7px;
  letter-spacing: .1em;
  line-height: 1;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  position: relative;
  background: linear-gradient(180deg, rgba(0,0,0,.78) 0%, rgba(0,0,0,.95) 100%);
  text-shadow: 0 1px 6px rgba(0,0,0,.8);
  border-radius: 0 0 6px 6px;
}
/* Ligne accent sous le nom */
.cname::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--team-accent), transparent);
  opacity: .6;
}
/* Losange décoratif centré */
.cname::after {
  content: '◆';
  position: absolute;
  bottom: 1.5px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 4px;
  color: var(--team-accent);
  opacity: .55;
  letter-spacing: 5px;
}


/* HEXAGONE HOVER — apparaît au-dessus de la carte au hover */
.player{position:absolute;transform:translate(-50%,-50%);z-index:10;}
.player:hover{z-index:200;}
.hex-overlay{
  display:none;
  position:absolute;
  /* taille et position calculées en JS */
  top:0;left:0;
  z-index:200;
  pointer-events:none;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,.9));
  transition:opacity .15s;
  overflow:visible;
}
.player:hover .hex-overlay{display:block;}
.player.hex-active .hex-overlay{display:block;}
.player:hover { z-index: 200; }
/* Nom au centre de l'hexagone */
.hex-overlay .hex-name{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Oswald',sans-serif;
  font-size:11px;font-weight:700;
  color:#fff;text-transform:uppercase;
  letter-spacing:.06em;text-align:center;
  pointer-events:none;
  text-shadow:0 1px 4px rgba(0,0,0,.9);
  white-space:nowrap;
}


/* ONGLET STATS dans la barre de dates */
.tab-stats{
  background:rgba(255,215,0,.12)!important;
  color:#FFD600!important;
  border-color:rgba(255,215,0,.35)!important;
}
.tab-stats.active{
  background:#FFD600!important;
  color:#000!important;
  border-color:#FFD600!important;
}

/* VUE STATS */
#view-stats{display:none;width:min(calc(100vw - 2rem),480px);padding:.5rem}
.stats-header{
  display:flex;align-items:center;gap:.5rem;
  font-family:'Oswald',sans-serif;font-size:.8rem;font-weight:700;
  color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.12em;
  margin-bottom:.8rem;padding:.3rem .2rem;
}
.stats-cols{
  display:grid;grid-template-columns:28px 1fr 56px 62px 80px;
  align-items:center;padding:.3rem .4rem;margin-bottom:.3rem;
  font-family:'Oswald',sans-serif;font-size:.68rem;font-weight:700;
  color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;
}
.stats-row{
  display:grid;grid-template-columns:28px 1fr 56px 62px 80px;
  align-items:center;padding:.5rem .4rem;border-radius:6px;
  margin-bottom:3px;transition:background .12s;
}
.stats-row:hover{background:rgba(255,255,255,.07)}
.stats-row:nth-child(odd){background:rgba(255,255,255,.03)}
.stats-row:nth-child(odd):hover{background:rgba(255,255,255,.08)}
.sr-rank{font-family:'Oswald',sans-serif;font-size:.78rem;font-weight:700;color:rgba(255,255,255,.45);text-align:center}
.sr-name{font-family:'Oswald',sans-serif;font-size:.82rem;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.04em}
.sr-num{font-family:'Oswald',sans-serif;font-size:.78rem;color:rgba(255,255,255,.65);text-align:center}
.sr-pct{font-family:'Oswald',sans-serif;font-size:.82rem;font-weight:700;text-align:right;padding-right:.3rem}
.sr-bar-wrap{height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.sr-bar{height:100%;border-radius:3px;transition:width .3s}

/* LÉGENDE */
.legend{display:flex;gap:2rem;justify-content:center;margin-top:.8rem}
.leg{display:flex;align-items:center;gap:.4rem;font-size:.65rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em}
.leg-dot{width:10px;height:10px;border-radius:2px;border:2px solid}
.leg-a .leg-dot{border-color:rgba(255,255,255,.8)}
.leg-b .leg-dot{border-color:#4d9fff}

/* VUE STATS */
#view-stats{display:none;width:min(calc(100vw - 2rem),480px)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;padding:.4rem}
.scard{background:rgba(255,255,255,.05);border-radius:8px;
  border:1.5px solid rgba(255,255,255,.1);padding:.5rem .4rem;
  display:flex;flex-direction:column;align-items:center;cursor:pointer;
  transition:transform .15s,border-color .15s}
.scard:hover{transform:scale(1.03);border-color:rgba(255,255,255,.3)}
.scard.sb{border-color:rgba(77,159,255,.25)}
.scard.sb:hover{border-color:#4d9fff}
.sname{font-family:'Oswald',sans-serif;font-size:.72rem;font-weight:700;
  color:#fff;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem}

/* MODAL RADAR */
.modal{display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,.8);align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-inner{background:#141a24;border-radius:14px;border:1.5px solid rgba(255,255,255,.15);
  padding:1.2rem 1rem;display:flex;flex-direction:column;align-items:center;min-width:240px}
.modal-name{font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;
  color:#fff;text-transform:uppercase;margin-bottom:.5rem;letter-spacing:.06em}
.modal-close{margin-top:.8rem;font-size:.7rem;color:rgba(255,255,255,.4);cursor:pointer;
  padding:.3rem .8rem;border:1px solid rgba(255,255,255,.15);border-radius:99px}
.modal-close:hover{color:#fff;border-color:rgba(255,255,255,.4)}

footer{margin-top:2.5rem;margin-bottom:1.5rem;font-size:.58rem;color:rgba(255,255,255,.1);letter-spacing:.2em;text-transform:uppercase}

/* ── ANIMATION SCORE ── */
@keyframes score-pop {
  0%   { opacity:0; transform:scale(1.15) translateY(-6px); }
  60%  { opacity:1; transform:scale(1.03) translateY(0); }
  100% { transform:scale(1) translateY(0); }
}
@keyframes score-flash {
  0%,100% { opacity:1; }
  50%     { opacity:.5; }
}
.score-animate {
  animation: score-pop 0.75s cubic-bezier(.22,1,.36,1) forwards;
  display:inline-block;
}
.score-animate::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(255,200,0,.15) 0%, transparent 65%);
  pointer-events: none;
  animation: score-flash 0.65s ease-out forwards;
  z-index: 999;
}

/* ── MATRICE DUOS ── */
.duo-matrix-wrap{width:100%;overflow-x:auto;margin-top:.4rem;padding-bottom:.4rem}
.duo-matrix{border-collapse:separate;border-spacing:2px;font-family:'Barlow',sans-serif;font-size:.6rem}
.duo-matrix th{font-family:'Oswald',sans-serif;font-size:.55rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.04em;color:rgba(255,255,255,.5);padding:3px 2px;text-align:center;
  white-space:nowrap;max-width:38px;overflow:hidden;text-overflow:ellipsis}
.duo-matrix th.rh{text-align:right;padding-right:5px;color:rgba(255,255,255,.7);font-size:.57rem;min-width:52px}
.duo-matrix td{width:30px;height:26px;text-align:center;vertical-align:middle;border-radius:4px;
  font-weight:700;font-size:.62rem;transition:transform .12s;cursor:default}
.duo-matrix td:hover{transform:scale(1.2);z-index:2;position:relative}
.dm-self  {background:rgba(255,255,255,.03)}
.dm-empty {background:rgba(255,255,255,.05);color:rgba(255,255,255,.15);font-size:.5rem}
.dm-green {background:rgba(74,222,128,.2);color:#4ade80;border:1px solid rgba(74,222,128,.3)}
.dm-yellow{background:rgba(255,214,0,.18);color:#FFD600;border:1px solid rgba(255,214,0,.28)}
.dm-orange{background:rgba(249,115,22,.18);color:#f97316;border:1px solid rgba(249,115,22,.28)}
.dm-red   {background:rgba(239,68,68,.18);color:#ef4444;border:1px solid rgba(239,68,68,.28)}

/* ── VOTE HOMME DU MATCH ── */
.mvp-section{width:min(calc(100vw - 2rem),480px);margin:.8rem auto 0;background:rgba(255,214,0,.06);border:1px solid rgba(255,214,0,.2);border-radius:12px;padding:1.1rem 1.3rem;font-family:'Barlow',sans-serif}
.mvp-title{font-family:'Oswald',sans-serif;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#FFD600;margin-bottom:.5rem}
.mvp-cards{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:.8rem}
.mvp-card{width:72px;display:flex;flex-direction:column;align-items:center;gap:.3rem;cursor:pointer;opacity:.6;transition:all .18s;border-radius:8px;padding:.3rem;border:2px solid transparent}
.mvp-card:hover{opacity:1;transform:translateY(-3px)}
.mvp-card.selected{opacity:1;border-color:#FFD600;background:rgba(255,214,0,.12);transform:translateY(-3px)}
.mvp-card img{width:52px;height:52px;border-radius:50%;object-fit:cover;object-position:top}
.mvp-card-name{font-family:'Oswald',sans-serif;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#fff;text-align:center;line-height:1.1}
.mvp-voter-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;margin-top:1rem}
.mvp-voter-row label{font-size:.7rem;color:rgba(255,255,255,.5);min-width:60px}
.mvp-voter-row select{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#fff;font-family:'Barlow',sans-serif;font-size:.78rem;padding:.35rem .6rem;outline:none}
.mvp-voter-row select option{background:#1a2a1a}
.mvp-comment-row textarea{width:100%;box-sizing:border-box;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#fff;font-family:'Barlow',sans-serif;font-size:.75rem;padding:.4rem .6rem;outline:none;resize:none;height:48px;margin-bottom:.5rem}
.mvp-btn{background:#FFD600;color:#000;border:none;border-radius:6px;font-family:'Oswald',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.08em;padding:.38rem 1.2rem;cursor:pointer;text-transform:uppercase;transition:opacity .15s}
.mvp-btn:hover{opacity:.85}
.mvp-btn:disabled{opacity:.4;cursor:default}
.mvp-info{font-size:.68rem;color:rgba(255,255,255,.3);margin-top:.4rem;font-style:italic}
.mvp-results{margin-top:.6rem}
.mvp-winner-block{display:flex;align-items:center;gap:.8rem;margin-bottom:.7rem}
.mvp-winner-photo{width:40px;height:40px;border-radius:50%;object-fit:cover;object-position:top;border:2px solid #FFD600}
.mvp-winner-name{font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;color:#FFD600;letter-spacing:.06em;line-height:1}
.mvp-winner-sub{font-size:.68rem;color:rgba(255,255,255,.4);margin-top:.2rem}
.mvp-bars{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.5rem}
.mvp-bar-row{display:flex;align-items:center;gap:.5rem;font-size:.7rem}
.mvp-bar-name{min-width:60px;color:rgba(255,255,255,.7);font-weight:600}
.mvp-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.mvp-bar-fill{height:100%;background:#FFD600;border-radius:3px;transition:width .5s}
.mvp-bar-count{min-width:22px;text-align:right;color:rgba(255,255,255,.35)}
.mvp-comments-list{display:flex;flex-direction:column;gap:.4rem;margin-top:.5rem;border-top:1px solid rgba(255,255,255,.07);padding-top:.5rem}
.mvp-comment-item{background:rgba(255,255,255,.04);border-radius:6px;padding:.4rem .6rem;border-left:3px solid rgba(255,214,0,.5)}
.mvp-comment-text{font-size:.72rem;color:rgba(255,255,255,.8);font-style:italic;line-height:1.4}
.mvp-comment-author{font-style:normal;font-weight:700;color:rgba(255,214,0,.8);font-size:.65rem;margin-top:.3rem;text-transform:uppercase;letter-spacing:.06em}
.mvp-closed{font-size:.72rem;color:rgba(255,255,255,.3);font-style:italic;text-align:center;padding:.3rem 0}
.mvp-voted-ok{font-size:.75rem;color:#4ade80;text-align:center;padding:.4rem 0;font-weight:600}

/* ── ARTICLE L'ÉQUIPE ── */
.article-section{width:min(calc(100vw - 2rem),480px);margin:1.4rem auto 0;font-family:'Barlow',sans-serif;border-top:1px solid rgba(255,255,255,.1);padding:1.2rem 0 1.5rem}
.article-kicker{font-family:'Oswald',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#FFD600;margin-bottom:.35rem}
.article-headline{font-family:'Oswald',sans-serif;font-size:1.25rem;font-weight:700;color:#fff;line-height:1.15;margin-bottom:.25rem;letter-spacing:.01em}
.article-sub{font-size:.78rem;color:rgba(255,255,255,.45);margin-bottom:1rem;font-style:italic}
.article-divider{height:2px;background:linear-gradient(90deg,#FFD600,transparent);margin-bottom:1rem;border:none;width:60px}
.article-body{font-size:.82rem;color:rgba(255,255,255,.85);line-height:1.65}
.article-body p{margin:0 0 .8rem}
.article-body h3{font-family:'Oswald',sans-serif;font-size:.88rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#fff;margin:1.1rem 0 .4rem;border-left:3px solid #FFD600;padding-left:.5rem}
.article-body strong{color:#fff;font-weight:700}
.article-body em{color:rgba(255,214,0,.8);font-style:normal;font-weight:600}
.article-footer{font-size:.68rem;color:rgba(255,255,255,.25);margin-top:1rem;text-align:right;letter-spacing:.06em;text-transform:uppercase}

/* ── Responsive mobile ── */
@media (max-width: 420px) {
  .pitch-wrap {
    width: calc(100vw - 1rem);
    aspect-ratio: 8 / 13;
    min-height: 480px;
    overflow: visible;

  }

  .mvp-section,
  .article-section {
    width: calc(100vw - 1rem);
  }
}
</style>

var CRITERIA = {"Quentin": [8, 7, 8, 6, 7, 7, 7], "Jack": [10, 8, 10, 7, 8, 9, 10], "Dylan": [10, 8, 9, 9, 6, 7, 7], "Johann": [10, 9, 8, 9, 5, 7, 7], "Hugo": [7, 8, 7, 9, 7, 9, 8], "Raphaël": [9, 9, 6, 7, 6, 8, 6], "Khalid": [8, 7, 6, 6, 8, 9, 10], "Spy": [7, 8, 9, 8, 6, 7, 7], "Thomas D": [9, 8, 8, 6, 6, 7, 7], "Guilhem": [8, 7, 8, 7, 6, 6, 7], "Ibrahima": [6, 7, 5, 7, 7, 7, 6], "Flo": [7, 6, 7, 6, 6, 8, 6], "Michael": [5, 5, 5, 10, 7, 8, 6], "Cyril": [6, 7, 5, 5, 7, 6, 6], "Alex": [7, 4, 6, 7, 6, 8, 5], "Tim": [6, 7, 7, 6, 8, 8, 6], "Théo": [7, 7, 7, 7, 6, 7, 8], "Edouard": [6, 5, 6, 5, 4, 6, 6], "Gugu": [4, 6, 6, 6, 7, 7, 6], "Rémi": [5, 5, 5, 7, 7, 6, 5], "Landry": [7, 5, 6, 6, 6, 6, 5], "Henri": [7, 6, 6, 6, 3, 5, 6]};
var LABELS   = ["Tech", "Fin", "Vis", "Phy", "Vit", "End", "Men"];

/* ── RADAR ── */
function radarPts(vals,cx,cy,r){
  var pts=[];
  for(var i=0;i<vals.length;i++){
    var a=Math.PI/2-2*Math.PI*i/vals.length;
    pts.push((cx+r*(vals[i]/10)*Math.cos(a)).toFixed(1)+','+(cy-r*(vals[i]/10)*Math.sin(a)).toFixed(1));
  }
  return pts.join(' ');
}
function radarGrid(cx,cy,r,n){
  var s='';
  [.25,.5,.75,1].forEach(function(lvl){
    var pp=[];
    for(var i=0;i<n;i++){var a=Math.PI/2-2*Math.PI*i/n;pp.push((cx+r*lvl*Math.cos(a)).toFixed(1)+','+(cy-r*lvl*Math.sin(a)).toFixed(1));}
    s+='<polygon points="'+pp.join(' ')+'" fill="none" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>';
  });
  for(var i=0;i<n;i++){var a=Math.PI/2-2*Math.PI*i/n;s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a)).toFixed(1)+'" y2="'+(cy-r*Math.sin(a)).toFixed(1)+'" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>';}
  return s;
}
function radarSvg(name,isA,sz){
  sz=sz||90;
  var vals=CRITERIA[name]||[5,5,5,5,5,5,5];
  var cx=50,cy=50,r=34,n=7;
  var col=isA?'rgba(255,255,255,.85)':'#4d9fff';
  var fill=isA?'rgba(255,255,255,.12)':'rgba(77,159,255,.18)';
  var tot=vals.reduce(function(a,b){return a+b;},0);
  var lbl='';
  LABELS.forEach(function(l,i){
    var a=Math.PI/2-2*Math.PI*i/n;
    lbl+='<text x="'+(cx+(r+12)*Math.cos(a)).toFixed(1)+'" y="'+(cy-(r+12)*Math.sin(a)).toFixed(1)+
      '" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,.5)" font-size="5.5" font-family="Barlow,sans-serif">'+l+'</text>';
  });
  return '<svg viewBox="0 0 100 100" width="'+sz+'" height="'+sz+'">'+
    radarGrid(cx,cy,r,n)+
    '<polygon points="'+radarPts(vals,cx,cy,r)+'" fill="'+fill+'" stroke="'+col+'" stroke-width="1.3"/>'+
    lbl+
    '<text x="50" y="50" text-anchor="middle" dominant-baseline="middle" fill="'+col+
    '" font-size="10" font-weight="700" font-family="Oswald,sans-serif">'+tot+'</text></svg>';
}

/* ── MODAL ── */
function openModal(name,isA){
  document.getElementById('mname').textContent=name;
  document.getElementById('msvg').innerHTML=radarSvg(name,isA,180);
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
  // Fix iOS : ferme tous les hex-overlays actifs si on touche hors d'un .player
  document.addEventListener('touchstart', function(e) {
    if (!e.target.closest('.player')) {
      document.querySelectorAll('.player.hex-active').forEach(function(p) {
        p.classList.remove('hex-active');
      });
    }
  }, {passive: true});
});

/* ── VUES ── */
function switchView(v){
  var isPitch=(v==='pitch');
  document.getElementById('view-pitch').style.display=isPitch?'block':'none';
  document.getElementById('view-stats').style.display=isPitch?'none':'block';
  document.querySelectorAll('.vtab').forEach(function(t){
    t.classList.toggle('active', t.dataset.view===v);
  });
  if(!isPitch) buildStatsView();
}
function buildStats(s){
  var h='<div class="stats-grid">';
  s.players.forEach(function(p){
    var cls=p.teamA?'':'sb';
    h+='<div class="scard '+cls+'" data-name="'+p.name+'" data-tea="'+(p.teamA?1:0)+'">';
    h+='<div class="sname">'+p.name+'</div>';
    h+=radarSvg(p.name,p.teamA,90);
    h+='</div>';
  });
  // Ajouter les listeners après injection
  setTimeout(function(){
    document.querySelectorAll('#view-stats .scard').forEach(function(el){
      el.addEventListener('click',function(){
        openModal(this.dataset.name, this.dataset.tea==='1');
      });
    });
  },0);
  h+='</div>';
  document.getElementById('view-stats').innerHTML=h;
}

/* ── SCORE COLORÉ ── */
function renderScore(s){
  var el=document.getElementById('score');
  el.textContent=s.score;
  el.className='score-bubble';
  if(s.scoreWinner==='A') el.classList.add('score-win-a');
  else if(s.scoreWinner==='B') el.classList.add('score-win-b');
  else el.classList.add('score-pending');
  // Animation uniquement sur les sessions passées (score connu)
  if(s.scoreWinner==='A'||s.scoreWinner==='B'){
    el.classList.remove('score-animate');
    void el.offsetWidth; // force reflow pour relancer l'animation
    el.classList.add('score-animate');
  }
}

/* ── LIENS DUO ── */
function getPairWinRate(n1, n2) {
  for (var i = 0; i < PAIR_STATS.length; i++) {
    var p = PAIR_STATS[i];
    if ((p.p1===n1&&p.p2===n2)||(p.p1===n2&&p.p2===n1)) {
      return {together: p.together, wins: p.wins, pct: Math.round(p.wins/p.together*100)};
    }
  }
  return null;
}

function duoColor(pct) {
  if (pct >= 67) return {stroke:'#4ade80', glow:'rgba(74,222,128,0.35)'};
  if (pct >= 50) return {stroke:'#FFD600', glow:'rgba(255,214,0,0.3)'};
  return {stroke:'#ff5555', glow:'rgba(255,85,85,0.3)'};
}

function drawDuoLinks(players, container) {
  var old = container.querySelector('.duo-svg');
  if (old) old.remove();

  var W = container.offsetWidth;
  var H = container.offsetHeight;
  // Fallback sur le parent pitch si dimensions incorrectes
  if (!W || !H) {
    var pitch = container.closest ? container.closest('.pitch-wrap') : null;
    W = (pitch && pitch.offsetWidth) || 360;
    H = (pitch && pitch.offsetHeight) || 480;
  }
  if (!W || !H) {
    requestAnimationFrame(function(){ drawDuoLinks(players, container); });
    return;
  }

  var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','duo-svg');
  svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:12;overflow:hidden';

  var teamA = players.filter(function(p){return p.teamA;});
  var teamB = players.filter(function(p){return !p.teamA;});

  function drawLinks(team) {
    for (var i = 0; i < team.length; i++) {
      for (var j = i+1; j < team.length; j++) {
        var pa = team[i], pb = team[j];
        var pair = getPairWinRate(pa.name, pb.name);
        if (!pair) continue;
        var c = duoColor(pair.pct);

        // Coordonnées pixel réelles
        var x1=pa.x/100*W, y1=pa.y/100*H;
        var x2=pb.x/100*W, y2=pb.y/100*H;
        var dx=x2-x1, dy=y2-y1;
        var dist=Math.sqrt(dx*dx+dy*dy);
        // Centre entre les deux
        var mx=(x1+x2)/2, my=(y1+y2)/2;
        // Marge = 28px de chaque côté (demi-largeur carte)
        var mg=38;
        var hasLine = dist > mg*2 + 8;

        if (hasLine) {
          var r=mg/dist;
          var sx1=x1+dx*r, sy1=y1+dy*r;
          var sx2=x2-dx*r, sy2=y2-dy*r;

          // Courbure legere
          var perpX = -(sy2-sy1), perpY = sx2-sx1;
          var perpLen = Math.sqrt(perpX*perpX+perpY*perpY);
          var curve = 14;
          var cpx = (sx1+sx2)/2 + perpX/perpLen*curve;
          var cpy = (sy1+sy2)/2 + perpY/perpLen*curve;

          var pathD = 'M'+sx1.toFixed(1)+' '+sy1.toFixed(1)+' Q'+cpx.toFixed(1)+' '+cpy.toFixed(1)+' '+sx2.toFixed(1)+' '+sy2.toFixed(1);

          // Toutes les lignes egalement visibles — opacite fixe, epaisseur fixe
          // La couleur porte l'info (vert/jaune/rouge), pas l'opacite
          var lineWidth   = pair.pct >= 67 ? 1.5 : pair.pct >= 50 ? 1.3 : 1.4;
          var lineOpacity = pair.pct >= 67 ? 0.70 : pair.pct >= 50 ? 0.65 : 0.72;

          // Groupe pour hit + trait — le groupe gere le hover ensemble
          var g = document.createElementNS('http://www.w3.org/2000/svg','g');
          g.style.cursor = 'crosshair';

          // Zone de hit large invisible
          var hit = document.createElementNS('http://www.w3.org/2000/svg','path');
          hit.setAttribute('d', pathD);
          hit.setAttribute('fill','none');
          hit.setAttribute('stroke','rgba(0,0,0,0)');
          hit.setAttribute('stroke-width','16');

          // Trait visible
          var line = document.createElementNS('http://www.w3.org/2000/svg','path');
          line.setAttribute('d', pathD);
          line.setAttribute('fill','none');
          line.setAttribute('stroke', c.stroke);
          line.setAttribute('stroke-width', String(lineWidth));
          line.setAttribute('stroke-linecap','round');
          line.setAttribute('stroke-opacity', String(lineOpacity));

          g.appendChild(hit);
          g.appendChild(line);

          // Tooltip HTML custom
          var tip = document.getElementById('duo-tooltip');
          var pctText = pair.pct + '% — ' + pa.name + ' + ' + pb.name + ' (' + pair.wins + 'V/' + pair.together + ')';
          var strokeColor = c.stroke;
          var lw = lineWidth;
          var lo = lineOpacity;

          g.addEventListener('mouseenter', function(e) {
            line.setAttribute('stroke-width','2.8');
            line.setAttribute('stroke-opacity','1');
            tip.style.color = strokeColor;
            tip.style.borderColor = strokeColor;
            tip.textContent = pctText;
            tip.style.display = 'block';
            tip.style.left = e.clientX + 'px';
            tip.style.top  = e.clientY + 'px';
          });
          g.addEventListener('mousemove', function(e) {
            tip.style.left = e.clientX + 'px';
            tip.style.top  = e.clientY + 'px';
          });
          g.addEventListener('mouseleave', function() {
            line.setAttribute('stroke-width', String(lw));
            line.setAttribute('stroke-opacity', String(lo));
            tip.style.display = 'none';
          });

          svg.appendChild(g);
        }
      }
    }
  }

  drawLinks(teamA);
  drawLinks(teamB);
  container.insertBefore(svg, container.firstChild);
}

  setTimeout(injectTrophies, 50);
  renderMvpSection(s);
  renderArticle(s);
}


/* ── HEXAGONE HOVER ── */
var LABELS6 = ['Tech','Fin','Vis','Phy','Vit','End'];

function hex6Pts(vals, cx, cy, r) {
  var pts = [];
  for (var i = 0; i < 6; i++) {
    var a = Math.PI / 2 - 2 * Math.PI * i / 6;
    var v = vals[i] / 10;
    pts.push((cx + r * v * Math.cos(a)).toFixed(1) + ',' + (cy - r * v * Math.sin(a)).toFixed(1));
  }
  return pts.join(' ');
}
function hex6Grid(cx, cy, r) {
  var s = '';
  [0.25, 0.5, 0.75, 1].forEach(function(lvl) {
    var pp = [];
    for (var i = 0; i < 6; i++) {
      var a = Math.PI / 2 - 2 * Math.PI * i / 6;
      pp.push((cx + r * lvl * Math.cos(a)).toFixed(1) + ',' + (cy - r * lvl * Math.sin(a)).toFixed(1));
    }
    s += '<polygon points="' + pp.join(' ') + '" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="0.8"/>';
  });
  for (var i = 0; i < 6; i++) {
    var a = Math.PI / 2 - 2 * Math.PI * i / 6;
    s += '<line x1="' + cx + '" y1="' + cy + '" x2="' + (cx + r * Math.cos(a)).toFixed(1) + '" y2="' + (cy - r * Math.sin(a)).toFixed(1) + '" stroke="rgba(255,255,255,.18)" stroke-width="0.8"/>';
  }
  return s;
}
function hex6Labels(cx, cy, r) {
  var s = '';
  LABELS6.forEach(function(lbl, i) {
    var a = Math.PI / 2 - 2 * Math.PI * i / 6;
    /* Labels à 78% du rayon = toujours dans le cercle */
    var lr = r * 0.78;
    var x = (cx + lr * Math.cos(a)).toFixed(1);
    var y = (cy - lr * Math.sin(a)).toFixed(1);
    s += '<text x="' + x + '" y="' + y + '" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,.85)" font-size="8" font-family="Barlow,sans-serif" font-weight="700">' + lbl + '</text>';
  });
  return s;
}
function makeHexOverlaySvg(name, isA) {
  var crit = CRITERIA[name] || [5,5,5,5,5,5,5];
  var vals6 = crit.slice(0, 6); // 6 premiers : Tech, Fin, Vis, Phy, Vit, End
  var cx = 82, cy = 82, r = 52;
  var col = isA ? 'rgba(255,255,255,.9)' : '#4d9fff';
  var fill = isA ? 'rgba(255,255,255,.15)' : 'rgba(77,159,255,.22)';
  var bg = isA ? 'rgba(10,15,25,.88)' : 'rgba(10,15,35,.88)';
  return '<svg viewBox="0 0 164 164" width="164" height="164" style="display:block;width:100%;height:100%" xmlns="http://www.w3.org/2000/svg">' +
    '<circle cx="82" cy="82" r="76" fill="' + bg + '" stroke="' + col + '" stroke-width="1.5"/>' +
    hex6Grid(cx, cy, r) +
    '<polygon points="' + hex6Pts(vals6, cx, cy, r) + '" fill="' + fill + '" stroke="' + col + '" stroke-width="1.5"/>' +
    hex6Labels(cx, cy, r) +
    '</svg>';
}

function positionHexOverlay(playerDiv, overlay) {
  var pitch = playerDiv.closest('.pitch-wrap') || playerDiv.closest('.pitch') || playerDiv.parentElement;
  var pitchW = pitch ? pitch.offsetWidth : 480;
  var pitchH = pitch ? pitch.offsetHeight : 640;
  var hexSize = 140;
  var gap = 6;

  var pctX = parseFloat(playerDiv.style.left) || 50;
  var pctY = parseFloat(playerDiv.style.top) || 50;
  var centerPixX = pctX / 100 * pitchW;
  var centerPixY = pctY / 100 * pitchH;
  var cardW = playerDiv.offsetWidth || 86;
  var cardH = playerDiv.offsetHeight || 120;

  // Règle simple par zone x :
  // x <= 40 → gauche (voisin probable à droite)
  // x >= 60 → droite (voisin probable à gauche)
  // x = 50 → côté avec le plus d'espace
  var spaceRight = pitchW - (centerPixX + cardW / 2) - gap;
  var spaceLeft  = (centerPixX - cardW / 2) - gap;

  var goRight;
  if (pctX <= 20) {
    goRight = true;   // bord gauche → overlay à DROITE (vers l'intérieur)
  } else if (pctX <= 40) {
    goRight = false;  // milieu-gauche → overlay à GAUCHE
  } else if (pctX >= 80) {
    goRight = false;  // bord droit → overlay à GAUCHE (vers l'intérieur)
  } else if (pctX >= 60) {
    goRight = true;   // milieu-droit → overlay à DROITE
  } else {
    goRight = spaceRight >= spaceLeft;
  }

  var overlayLeft = goRight ? cardW + gap : -(hexSize + gap);

  // Vertical : centré sur la carte par défaut
  var overlayTop = cardH / 2 - hexSize / 2;

  // Mise à jour taille SVG
  var svgEl = overlay.querySelector('svg');
  if (svgEl) {
    svgEl.setAttribute('width', hexSize);
    svgEl.setAttribute('height', hexSize);
  }

  // Clamp vertical dans le terrain
  var cardTopAbs    = centerPixY - cardH / 2;
  var overlayTopAbs = cardTopAbs + overlayTop;
  if (overlayTopAbs < 4) overlayTop += (4 - overlayTopAbs);
  if (overlayTopAbs + hexSize > pitchH - 4) overlayTop -= (overlayTopAbs + hexSize - (pitchH - 4));

  // Clamp horizontal dans le terrain
  var cardLeftAbs    = centerPixX - cardW / 2;
  var overlayLeftAbs = cardLeftAbs + overlayLeft;
  if (overlayLeftAbs < 4) overlayLeft += (4 - overlayLeftAbs);
  if (overlayLeftAbs + hexSize > pitchW - 4) overlayLeft -= (overlayLeftAbs + hexSize - (pitchW - 4));

  overlay.style.width     = hexSize + 'px';
  overlay.style.height    = hexSize + 'px';
  overlay.style.left      = overlayLeft + 'px';
  overlay.style.top       = overlayTop + 'px';
  overlay.style.transform = 'none';
}

function addHexOverlays(playerDiv, name, isA) {
  var overlay = document.createElement('div');
  overlay.className = 'hex-overlay';
  overlay.innerHTML = makeHexOverlaySvg(name, isA) +
    '<div class="hex-name">' + name + '</div>';
  playerDiv.appendChild(overlay);

  // Repositionner au moment de l'affichage (dimensions connues à ce moment)
  function reposition() {
    positionHexOverlay(playerDiv, overlay);
  }

  // Fix iOS : toggle overlay au tap
  playerDiv.addEventListener('touchstart', function(e) {
    var isActive = playerDiv.classList.contains('hex-active');
    document.querySelectorAll('.player.hex-active').forEach(function(p) {
      p.classList.remove('hex-active');
    });
    if (!isActive) {
      playerDiv.classList.add('hex-active');
      reposition();
    }
    e.stopPropagation();
  }, {passive: true});

  playerDiv.addEventListener('mouseenter', function() {
    reposition();
  });
}

        html += '<div style="position:relative">';

      });

    }

  });

/* ── helpers date ── */
function mvpDeadline(sessionDate, sessionId) {
  if (sessionId === 's8') return new Date(2026, 4, 12, 23, 40, 0);
  if (sessionId === 's7') return new Date(2026, 4, 5, 23, 40, 0);
  var months = {janvier:0,février:1,mars:2,avril:3,mai:4,juin:5,juillet:6,août:7,septembre:8,octobre:9,novembre:10,décembre:11};
  var parts = sessionDate.split(' ');
  if (parts.length !== 3) return null;
  var d = new Date(parseInt(parts[2]), months[parts[1].toLowerCase()], parseInt(parts[0]), 12, 0, 0);
  d.setDate(d.getDate() + 1);
  return d;
}
function mvpMatchNight(sessionDate) {
  var months = {janvier:0,é:1};// dummy — on parse directement
  var parts = sessionDate.split(' ');
  if (parts.length !== 3) return false;
  var monthsFull = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  var mIdx = monthsFull.indexOf(parts[1].toLowerCase());
  if (mIdx < 0) return false;
  var now = new Date();
  return now.getFullYear() === parseInt(parts[2])
      && now.getMonth()    === mIdx
      && now.getDate()     === parseInt(parts[0])
      && (now.getHours() > 22 || (now.getHours() === 22 && now.getMinutes() >= 30));
}
function mvpIsOpen(s) {
  var dl = mvpDeadline(s.date, s.id);
  if (!dl) return false;
  var now = new Date();
  if (s.scoreWinner && !s.current) return now < dl;
  if (s.current && mvpMatchNight(s.date)) return now < dl;
  return false;
}
function mvpIsClosed(s) {
  var dl = mvpDeadline(s.date, s.id);
  if (!dl) return false;
  var now = new Date();
  if (s.scoreWinner && !s.current) return now >= dl;
  return false;
}
function mvpIsFullVote(s, votes) { return votes && votes.length >= s.players.length; }

function _renderMvpInner(s, votes) {
  var inner = document.getElementById('mvp-inner');
  if (!inner) return;
  var fullVote = mvpIsFullVote(s, votes);

  var isClosed = mvpIsClosed(s) || fullVote;
  var players  = s.players.map(function(p){ return p.name; });
  var html = '';

  /* ── Résultats ── (uniquement si vote clôturé) */
  if (votes.length > 0 && isClosed) {
    // Compter
    var counts = {};
    players.forEach(function(n){ counts[n] = 0; });
    votes.forEach(function(v){ if (counts[v.motm] !== undefined) counts[v.motm]++; });
    var sorted = players.slice().sort(function(a,b){ return counts[b]-counts[a]; });
    var winner = sorted[0];
    var winnerPhoto = mvpGetPhoto(winner, s.players);
    var total = votes.length;

    html += '<div class="mvp-winner-block">';
    if (winnerPhoto) html += '<img class="mvp-winner-photo" src="' + winnerPhoto + '" alt="' + winner + '">';
    html += '<div><div class="mvp-winner-name">⭐ ' + winner + '</div>';
    html += '<div class="mvp-winner-sub">' + counts[winner] + ' vote' + (counts[winner]>1?'s':'') + ' sur ' + total + '</div></div>';
    html += '</div>';

    // Barres
    html += '<div class="mvp-bars">';
    sorted.forEach(function(name) {
      if (!counts[name] && isClosed) return;
      var pct = total > 0 ? Math.round(counts[name]/total*100) : 0;
      html += '<div class="mvp-bar-row"><div class="mvp-bar-name">' + name + '</div>';
      html += '<div class="mvp-bar-wrap"><div class="mvp-bar-fill" style="width:' + pct + '%"></div></div>';
      html += '<div class="mvp-bar-count">' + counts[name] + '</div></div>';
    });
    html += '</div>';

    // Commentaires uniquement des votants pour le gagnant
    var winnerComments = votes.filter(function(v){ return v.motm === winner && v.comment && v.comment.trim(); });

      html += '<div class="mvp-comments-list">';
      winnerComments.forEach(function(v) {
        html += '<div class="mvp-comment-item"><div class="mvp-comment-text">"' + v.comment.trim() + '"</div><div class="mvp-comment-author">— ' + v.voter + '</div></div>';
      });
      html += '</div>';
    }
  } else if (isClosed) {
    html += '<div class="mvp-closed">Aucun vote enregistré pour cette session.</div>';
  }

  /* ── Formulaire de vote ── */
  var alreadyVotedLocal = !!localStorage.getItem('mvp_voted_' + s.id);

  // Pendant le vote ouvert : juste un compteur, pas de résultats
  if (isOpen && votes.length > 0) {
    html += '<div style="text-align:center;font-size:.7rem;color:rgba(255,255,255,.3);margin-bottom:.6rem">' + votes.length + ' vote' + (votes.length > 1 ? 's' : '') + ' enregistré' + (votes.length > 1 ? 's' : '') + ' — résultats après clôture</div>';
  }

  if (isOpen && !alreadyVotedLocal) {
    html += '<div id="mvp-form-' + s.id + '">';

    // Sélection voter
    html += '<div class="mvp-voter-row"><label>Je suis</label><select id="mvp-voter-' + s.id + '" onchange="mvpRefreshCards(\'' + s.id + '\')">';
    html += '<option value="">— choisis ton nom</option>';
    players.forEach(function(p) {
      var alreadyVoted = votes.some(function(v){ return v.voter === p; });
      html += '<option value="' + p + '"' + (alreadyVoted ? ' disabled' : '') + '>' + p + (alreadyVoted ? ' ✓' : '') + '</option>';
    });
    html += '</select></div>';

    // Cartes joueurs cliquables
    html += '<div style="text-align:center;font-family:Oswald,sans-serif;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.45);margin:.6rem 0 .4rem">👇 Sélectionne l&#39;homme du match</div>';
    html += '<div class="mvp-cards" id="mvp-cards-' + s.id + '">';
    players.forEach(function(p) {
      var photo = mvpGetPhoto(p, s.players);
      var initials = p.slice(0,2).toUpperCase();
      html += '<div class="mvp-card" data-name="' + p + '" onclick="mvpSelectCard(\'' + s.id + '\',\'' + p + '\')">';
      if (photo) {
        html += '<img src="' + photo + '" alt="' + p + '">';
      } else {
        html += '<div style="width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-family:Oswald,sans-serif;font-size:.75rem;color:rgba(255,255,255,.5)">' + initials + '</div>';

      html += '<div class="mvp-card-name">' + p + '</div></div>';

    html += '<div class="mvp-comment-row"><textarea id="mvp-comment-' + s.id + '" placeholder="Pourquoi ? (optionnel)"></textarea></div>';

    var dl = mvpDeadline(s.date, s.id);

  if (isClosed && votes.length > 0) {

    if (allComments.length && summaryEl) {
      generateMvpSummary(s.id, winner, allComments, summaryEl);

async function generateMvpSummary(sid, winner, comments, el) {
  var commentTexts = comments.map(function(c){ return '- ' + c.voter + ' : "' + c.comment.trim() + '"'; }).join('\n');
  var prompt = 'Tu es le journaliste du Five Lundi, un match de football entre amis. ' +
    winner + ' a été élu homme du match. ' +
    'Voici les commentaires des votants :\n' + commentTexts + '\n\n' +
    'Rédige UN résumé synthétique de 2-3 phrases maximum, à la troisième personne, sobre et percutant, ' +
    'qui capture l\'essence de sa performance selon les votants. ' +
    'Style L\'Équipe. Pas de bullet points. Pas de titre. Juste le texte.';

  try {
    var r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    var data = await r.json();
    var text = data.content && data.content[0] ? data.content[0].text : null;
    if (text && el) {
      el.innerHTML = '<div class="mvp-comment-item"><div class="mvp-comment-text" style="font-style:normal;color:rgba(255,255,255,.85);line-height:1.6">' + text.trim() + '</div>' +
        '<div class="mvp-comment-author" style="margin-top:.4rem">✍️ Résumé Claudio</div></div>';
    }
  } catch(e) {
    // Fallback : afficher les commentaires bruts
    if (el) {
      var html = '';
      comments.forEach(function(c) {
        html += '<div class="mvp-comment-item"><div class="mvp-comment-text">"' + c.comment.trim() + '"</div><div class="mvp-comment-author">— ' + c.voter + '</div></div>';
      });
      el.innerHTML = html;
    }
  }
}

async function submitMvpVote(sid) {
  var voterEl   = document.getElementById('mvp-voter-' + sid);
  var commentEl = document.getElementById('mvp-comment-' + sid);
  var btn       = document.getElementById('mvp-submit-' + sid);
  var voter   = voterEl ? voterEl.value.trim() : '';
  var motm    = _mvpSelected[sid] || '';
  var comment = commentEl ? commentEl.value.trim() : '';

  if (!voter) { alert('Sélectionne ton nom !'); return; }
  if (!motm)  { alert('Clique sur un joueur pour voter !'); return; }
  if (voter === motm) { alert('Tu ne peux pas voter pour toi-même !'); return; }

  // Vérifier localStorage
  var lsKey = 'mvp_voted_' + sid;
  if (localStorage.getItem(lsKey)) {
    alert('Tu as déjà voté pour cette session !');
    return;
  }

  if (btn) { btn.disabled = true; btn.textContent = 'Envoi…'; }

  try {
    await sbInsertVote(sid, voter, motm, comment);
    // Stocker dans localStorage
    localStorage.setItem(lsKey, voter);
    // Reload votes et refresh
    var s = SESSIONS.find(function(x){ return x.id === sid; });
    if (s) {
      var votes = await sbGetVotes(sid);
      var inner = document.getElementById('mvp-inner');
      if (inner) {
        inner.innerHTML = '<div class="mvp-voted-ok">✅ Vote enregistré — merci ' + voter + ' !</div>';
        setTimeout(function(){ _renderMvpInner(s, votes); }, 1800);
      }
    }
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Voter 🏅'; }
    if (e.message === 'already_voted') {
      localStorage.setItem(lsKey, voter); // stocker quand même
      alert('Tu as déjà voté pour cette session !');
    } else {
      alert('Erreur lors du vote. Vérifie ta connexion.');
    }
  }
}

      { type: 'p', text: '<strong>Ibrahima</strong> a complété ce trio de feu avec une activité physique constante et des buts aux moments clés. <strong>Spy</strong>, lui, a fait ce qu\'il fait de mieux — distribuer, lier, orchestrer — sans chercher la lumière pour lui-même.' },
      { type: 'h3', text: 'La Blanche asphyxiée' },
      { type: 'p', text: 'En face, le constat est cruel mais juste : la Blanche n\'a jamais vraiment existé offensivement. <strong>Hugo</strong>, cadenassé par Dylan, n\'a pu exprimer qu\'une fraction de son potentiel habituel. <strong>Johann</strong>, pris dans une bataille de titans face à Spy et Dylan, a consumé son énergie défensivement. <strong>Flo</strong>, sans le fil rouge qu\'Alex lui apporte habituellement, a semblé déconnecté des automatismes — un joueur honnête qui a besoin de jouer régulièrement pour être lui-même.' },
      { type: 'p', text: '<strong>Michael</strong> a tout donné derrière, avec un premier but qui laissait espérer. Mais à force de courir pour deux, il était méconnaissable physiquement dans le dernier quart d\'heure. <strong>Rémi</strong>, solide dans ses cages comme d\'habitude, n\'a eu que peu d\'espaces en attaque pour alimenter les montées.' },
      { type: 'p', text: 'Mention spéciale enfin pour <em>Gugu</em>, qui a assumé pleinement son double rôle de gardien et d\'attaquant mobile — des buts, des parades, et un engagement total des deux côtés du terrain. Exactement ce qu\'on lui demande.' },
      { type: 'footer', text: 'Bleue 12 · Blanche 8 — la Bleue s\'impose avec autorité après un début de match à couper le souffle. À lundi.' }
    ]
  }
};

function renderArticle(s) {
  var wrap = document.getElementById('article-section');
  if (!wrap) return;
  var art = ARTICLES[s.id];
  if (!art) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';

  var html = '<div class="article-kicker">' + art.kicker + '</div>';
  html += '<div class="article-headline">' + art.headline + '</div>';
  html += '<div class="article-sub">' + art.sub + '</div>';
  html += '<hr class="article-divider">';
  html += '<div class="article-body">';
  art.body.forEach(function(block) {
    if (block.type === 'p')      html += '<p>' + block.text + '</p>';
    if (block.type === 'h3')     html += '<h3>' + block.text + '</h3>';
    if (block.type === 'footer') html += '</div><div class="article-footer">' + block.text + '</div>';
  });
  if (!art.body.some(function(b){ return b.type === 'footer'; })) html += '</div>';
  wrap.innerHTML = html;
}

function buildTabs(){
  var wrap=document.getElementById('tabs');
  SESSIONS.forEach(function(s){
    var b=document.createElement('button');
    b.className='tab'+(s.current?' active':'');
    b.dataset.id=s.id;
    b.textContent=s.current?s.date+' ✦':s.date;
    b.onclick=function(){showPitch();renderSession(s);setActiveTab(s.id);};
    wrap.appendChild(b);
  });
  /* Onglet Stats */
  var bs=document.createElement('button');
  bs.className='tab tab-stats';
  bs.dataset.id='stats';
  bs.textContent='📊 Stats';
  bs.onclick=showStats;
  wrap.appendChild(bs);
}


buildTabs();
// Afficher la session current:true au chargement
// Session par défaut : priorité à celle avec vote ouvert, sinon current, sinon première
var defaultSession = SESSIONS.find(function(s){ return mvpIsOpen(s); })
  || SESSIONS.find(function(s){ return s.current; })
  || SESSIONS[0];
renderSession(defaultSession);
updateCountdown();
setInterval(updateCountdown, 1000);

/* ── FORM / TROPHÉES ── */
function getPlayerForm(name) {
  // Parcourir les sessions (sans la session en cours) pour retrouver les résultats
  var results = [];
  var pastSessions = SESSIONS.filter(function(s){ return s.score && s.score !== '— vs —'; });
  pastSessions.forEach(function(s){
    var inA = s.players.some(function(p){ return p.name === name && p.teamA; });
    var inB = s.players.some(function(p){ return p.name === name && !p.teamA; });
    if(inA) results.push(s.scoreWinner === 'A' ? 'W' : 'L');
    else if(inB) results.push(s.scoreWinner === 'B' ? 'W' : 'L');
  });
  return results.reverse(); // oldest→newest so slice(-N) = N most recentr
}

function getTrophy(name) {
  var results = getPlayerForm(name);
  if(results.length === 0) return null;

  var last2 = results.slice(-2);
  var last3 = results.slice(-3);
  var last5 = results.slice(-5);

  if(last5.length === 5 && last5.every(function(r){ return r==='W'; }))
    return {cls:'badge-invincible', label:'🛡 Invincible'};
  if(last3.length === 3 && last3.every(function(r){ return r==='W'; }))
    return {cls:'badge-fire', label:'🔥 En feu'};
  if(last3.length === 3 && last3.every(function(r){ return r==='L'; }))
    return {cls:'badge-curse', label:'💀 Maudit'};
  if(last2.length === 2 && last2.every(function(r){ return r==='W'; }) &&
     !(last3.length === 3 && last3.every(function(r){ return r==='W'; })))
    return {cls:'badge-up', label:'↑ En forme'};
  if(last2.length === 2 && last2.every(function(r){ return r==='L'; }) &&
     !(last3.length === 3 && last3.every(function(r){ return r==='L'; })))
    return {cls:'badge-down', label:'↓ En galère'};
  return null;
}

function makeFireLayers() {
  return '<div class="fire-layer fire-layer-1" style="transform:translate(-50%,-50%)"></div>'
       + '<div class="fire-layer fire-layer-2" style="transform:translate(-50%,-50%)"></div>'
       + '<div class="fire-layer fire-layer-3" style="transform:translate(-50%,-50%)"></div>';
}
  // Marge autour de la carte pour que les dents dépassent
function injectTrophies() {
  var layer = document.getElementById('players');
  if(!layer) return;
  // Reset tous les badges
  layer.querySelectorAll('.player').forEach(function(playerDiv) {
    playerDiv.classList.remove('badge-fire','badge-invincible','badge-curse','badge-up','badge-down');
    var old = playerDiv.querySelector('.badge-label');
    if(old) old.remove();
    playerDiv.querySelectorAll('.fire-layer,.dbz-aura').forEach(function(el){ el.remove(); });
  });
  layer.querySelectorAll('.player').forEach(function(playerDiv) {
    var cname = playerDiv.querySelector('.cname');
    if(!cname) return;
    var name = cname.textContent.trim();
    var badge = getTrophy(name);
    if(badge) {
      playerDiv.classList.add(badge.cls);
      var lbl = document.createElement('div');
      lbl.className = 'badge-label';
      lbl.style.cssText = 'font-size:8px;font-weight:700;font-family:Barlow,sans-serif;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.95);';
      if(badge.cls==='badge-fire')       lbl.style.color='#ff6a00';
      if(badge.cls==='badge-invincible') lbl.style.color='#ffd600';
      if(badge.cls==='badge-curse')      lbl.style.color='#b44fff';
      if(badge.cls==='badge-up')         lbl.style.color='#4ade80';
      if(badge.cls==='badge-down')       lbl.style.color='#ef4444';
      lbl.textContent = badge.label;
      playerDiv.appendChild(lbl);
      if(badge.cls === 'badge-fire') {
        var cardEl = playerDiv.querySelector('.card');
        var wrap = document.createElement('div');
        wrap.innerHTML = makeFireLayers();
        wrap.querySelectorAll('.fire-layer').forEach(function(el){
          // Insérer AVANT la carte → naturellement derrière dans le DOM
          playerDiv.insertBefore(el, cardEl);
        });
      }
    }
  });
}

/* ── COMPTE À REBOURS ── */
function getNextMatchDate() {
  // Next Monday 21:30 Paris time
  // Use the current session date if it's in the future
  var now = new Date();
  // Find current session date
  var cur = SESSIONS.find(function(s){ return s.current; });
  if(cur) {
    // Parse date from session (e.g. "27 avril 2026")
    var months = {'janvier':0,'février':1,'mars':2,'avril':3,'mai':4,'juin':5,
                  'juillet':6,'août':7,'septembre':8,'octobre':9,'novembre':10,'décembre':11};
    var parts = cur.date.split(' ');
    if(parts.length === 3) {
      var day = parseInt(parts[0]);
      var month = months[parts[1].toLowerCase()];
      var year = parseInt(parts[2]);
      if(!isNaN(day) && month !== undefined && !isNaN(year)) {
        var matchDate = new Date(year, month, day, 21, 30, 0);
        if(matchDate > now) return matchDate;
      }
    }
  }
  // Fallback: next Monday
  var d = new Date();
  var daysUntilMonday = (1 - d.getDay() + 7) % 7 || 7;
  d.setDate(d.getDate() + daysUntilMonday);
  d.setHours(21, 30, 0, 0);
  return d;
}

function updateCountdown() {
  var el = document.getElementById('countdown-timer');
  if(!el) return;
  var now = new Date();
  var target = getNextMatchDate();
  var diff = target - now;
  if(diff <= 0) {
    el.innerHTML = '<span class="cd-now">&#x26BD; Ce soir !</span>';
    return;
  }
  var days    = Math.floor(diff / 86400000);
  var hours   = Math.floor((diff % 86400000) / 3600000);
  var minutes = Math.floor((diff % 3600000) / 60000);
  var seconds = Math.floor((diff % 60000) / 1000);
  el.innerHTML =
    (days > 0 ? '<span class="cd-unit"><b>' + days + '</b><small>j</small></span>' : '') +
    '<span class="cd-unit"><b>' + String(hours).padStart(2,'0') + '</b><small>h</small></span>' +
    '<span class="cd-unit"><b>' + String(minutes).padStart(2,'0') + '</b><small>m</small></span>' +
    '<span class="cd-unit"><b>' + String(seconds).padStart(2,'0') + '</b><small>s</small></span>';
}

</script>

<div id="duo-tooltip" style="
  position:fixed;display:none;z-index:9999;
  background:rgba(10,14,22,.92);border:1px solid rgba(255,255,255,.15);
  border-radius:6px;padding:5px 9px;pointer-events:none;
  font-family:Barlow,sans-serif;font-size:.72rem;font-weight:700;
  color:#fff;letter-spacing:.04em;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.7);
  transform:translate(-50%,-130%);
"></div>

<script>
/* ═══════════════════════════════════════════
   TILT 3D POKÉMON — simeydotme style
   Inspiré de https://github.com/simeydotme/pokemon-cards-css
   ═══════════════════════════════════════════ */
(function() {
  var MAX_TILT = 18; // degrés
  var SCALE    = 1.3;
  var TRANSITION_SPEED = '0.4s';

  function injectCardLayers() {
    document.querySelectorAll('.card').forEach(function(card) {
      if (card.querySelector('.card-shine')) return;
      var shine = document.createElement('div');
      shine.className = 'card-shine';
      var holo  = document.createElement('div');
      holo.className = 'card-holo';
      card.appendChild(shine);
      card.appendChild(holo);
    });
  }

  function getCardEl(el) {
    return el.closest ? el.closest('.card') : null;
  }

  function onMove(e) {
    var card = getCardEl(e.target);
    if (!card) return;
    var rect = card.getBoundingClientRect();
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var clientY = e.touches ? e.touches[0].clientY : e.clientY;
    var x = clientX - rect.left;
    var y = clientY - rect.top;
    var w = rect.width;
    var h = rect.height;
    // 0..1 normalisé
    var px = x / w;
    var py = y / h;
    // Tilt : +MAX à droite/bas, -MAX à gauche/haut
    var rotX = (py - 0.5) * -MAX_TILT * 2;
    var rotY = (px - 0.5) * MAX_TILT * 2;
    card.style.transform = 'perspective(600px) rotateX('+rotX.toFixed(2)+'deg) rotateY('+rotY.toFixed(2)+'deg)';
    // Position CSS vars pour le shine (en %)
    var pxPct = (px * 100).toFixed(1) + '%';
    var pyPct = (py * 100).toFixed(1) + '%';
    card.style.setProperty('--mouse-x', pxPct);
    card.style.setProperty('--mouse-y', pyPct);
    // Déplacer le film holo en fonction de la position
    var shine = card.querySelector('.card-shine');
    if (shine) {
      shine.style.background = 'radial-gradient(farthest-corner ellipse at '+pxPct+' '+pyPct+', rgba(255,255,255,.55) 0%, rgba(255,255,255,.2) 20%, transparent 60%)';
    }
    var holo = card.querySelector('.card-holo');
    if (holo) {
      var hue = Math.round(px * 360);
      var hue2 = Math.round(py * 360);
      holo.style.background =
        'repeating-linear-gradient(0deg, hsla('+hue+',100%,55%,.06) 0px, hsla('+((hue+60)%360)+',100%,55%,.06) 2px, transparent 2px, transparent 4px),' +
        'repeating-linear-gradient(90deg, hsla('+hue2+',100%,55%,.05) 0px, transparent 2px, transparent 4px)';
    }
  }

  function getPlayerEl(card) {
    return card.closest ? card.closest('.player') : null;
  }

  function getScaleOrigin(playerDiv) {
    // Positions réelles : x in {12,35,50,65,88} / y in {8,24,38,62,76,92}
    var pctX = parseFloat(playerDiv.style.left) || 50;
    var pctY = parseFloat(playerDiv.style.top) || 50;
    // Horizontal : x<=20 → left, x>=60 → right, sinon center
    var ox = pctX <= 20 ? 'left' : pctX >= 60 ? 'right' : 'center';
    // Vertical : y<=40 → top, y>=55 → bottom, sinon center
    var oy = pctY <= 40 ? 'top' : pctY >= 55 ? 'bottom' : 'center';
    return ox + ' ' + oy;
  }

  function onEnter(e) {
    var card = getCardEl(e.target);
    if (!card) return;
    var player = getPlayerEl(card);
    card.classList.add('js-tilt-active');
    card.style.transition = 'transform 0.1s ease, box-shadow 0.3s ease';
    if (player) {
      player.style.transition = 'transform 0.25s cubic-bezier(.22,1,.36,1)';
      player.style.transformOrigin = getScaleOrigin(player);
      player.style.transform = 'translate(-50%,-50%) scale(1.3)';
      player.style.zIndex = '200';
    }
  }

  function onLeave(e) {
    var card = getCardEl(e.target);
    if (!card) return;
    var player = getPlayerEl(card);
    card.style.transition = 'transform '+TRANSITION_SPEED+' cubic-bezier(.22,1,.36,1), box-shadow '+TRANSITION_SPEED;
    card.style.transform = 'perspective(600px) rotateX(0deg) rotateY(0deg) scale(1)';
    card.classList.remove('js-tilt-active');
    if (player) {
      player.style.transition = 'transform 0.3s cubic-bezier(.22,1,.36,1)';
      player.style.transform = 'translate(-50%,-50%) scale(1)';
      player.style.zIndex = '10';
    }
  }

  function attachListeners() {
    document.querySelectorAll('.card').forEach(function(card) {
      card.removeEventListener('mousemove', onMove);
      card.removeEventListener('mouseenter', onEnter);
      card.removeEventListener('mouseleave', onLeave);
      card.addEventListener('mousemove', onMove);
      card.addEventListener('mouseenter', onEnter);
      card.addEventListener('mouseleave', onLeave);
    });
  }

  // Hook après renderSession
  var _origRender = window.renderSession;
  if (typeof _origRender === 'function') {
    window.renderSession = function(s) {
      _origRender(s);
      setTimeout(function() {
        injectCardLayers();
        attachListeners();
      }, 60);
    };
  }

  // Premier rendu
  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
      injectCardLayers();
      attachListeners();
    }, 200);
  });

  // Re-attacher si les cartes sont régénérées (ex: changement onglet session)
  var _obs = new MutationObserver(function(mutations) {
    var needsRebind = false;
    mutations.forEach(function(m) {
      m.addedNodes.forEach(function(n) {
        if (n.nodeType === 1 && (n.classList && n.classList.contains('card') || n.querySelector && n.querySelector('.card'))) {
          needsRebind = true;
        }
      });
    });
    if (needsRebind) {
      setTimeout(function() {
        injectCardLayers();
        attachListeners();
      }, 30);
    }
  });
  document.addEventListener('DOMContentLoaded', function() {
    var pitch = document.getElementById('pitch');
    if (pitch) _obs.observe(pitch, {childList: true, subtree: true});
  });
})();
</script>
